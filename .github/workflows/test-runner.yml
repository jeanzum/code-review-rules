name: Test Self-Hosted Runner

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  test:
    runs-on: self-hosted
    
    steps:
      - name: Print runner info
        run: |
          echo "✅ Self-hosted runner funciona!"
          echo "Hostname: $(hostname)"
          echo "User: $(whoami)"
          echo "PWD: $(pwd)"
          uname -a
